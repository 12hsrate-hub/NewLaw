server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name lawyer5rp.ru www.lawyer5rp.ru;

    root /srv/newlaw/site;

    location /.well-known/acme-challenge/ {
        root /srv/newlaw/site;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lawyer5rp.ru www.lawyer5rp.ru;

    access_log /var/log/nginx/newlaw.access.log;
    error_log /var/log/nginx/newlaw.error.log;

    ssl_certificate /etc/letsencrypt/live/lawyer5rp.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lawyer5rp.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /.well-known/acme-challenge/ {
        root /srv/newlaw/site;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
