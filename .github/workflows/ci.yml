name: CI

on:
  push:
    branches:
      - main
      - staging
      - "feature/**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lawyer5rp_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/lawyer5rp_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      - name: Prisma validate
        run: pnpm prisma:validate

      - name: Prisma generate
        run: pnpm prisma:generate
